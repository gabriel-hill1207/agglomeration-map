<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAD Agglomeration Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Agglomeration Scores</h1>
      <p class="subtitle">Best to worst LAD for placing a new worker</p>
    </div>

    <div id="controls">
      <label for="sic-select">Select industry</label>
      <select id="sic-select"></select>
    </div>

    <div id="legend">
      <div class="legend-title">Agglomeration rank</div>
      <div class="legend-scale">
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span>Best (#1)</span>
          <span>Worst (#318)</span>
        </div>
      </div>
    </div>

    <div id="hover-info">
      <p class="placeholder">Hover over an area to see details</p>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="map.js"></script>
</body>
</html>
